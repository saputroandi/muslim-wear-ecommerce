services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: muslim-wear-app
    env_file: .env
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    container_name: muslim-wear-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: muslim_wear
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d muslim_wear"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

